name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.11.1 --distribution-type all

      - name: Create consistent debug keystore
        run: |
          # IMPORTANT: To avoid Android "package conflicts" on update, every APK must be
          # signed with the SAME key. Do not generate a new keystore in CI.
          if [ -z "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" ]; then
            echo "ERROR: Missing GitHub secret DEBUG_KEYSTORE_BASE64."
            echo "Create one debug.keystore once, base64-encode it, and save it as a repo secret."
            echo "Then rerun the workflow."
            exit 1
          fi

          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > ~/.android/debug.keystore
          cp ~/.android/debug.keystore android/debug.keystore

          # Output keystore fingerprint for verification
          keytool -list -v -keystore ~/.android/debug.keystore -storepass android 2>/dev/null | grep "SHA256:" || true

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK with version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/ImpactATMS-V${VERSION}.apk
          echo "APK renamed to ImpactATMS-V${VERSION}.apk"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ImpactATMS-V1.0.${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/ImpactATMS-V1.0.${{ github.run_number }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ImpactATMS v1.0.${{ github.run_number }}
          body: |
            ## ImpactATMS v1.0.${{ github.run_number }}
            
            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}
            
            ### Installation
            Download the APK below and install on your device.
          files: android/app/build/outputs/apk/debug/ImpactATMS-V1.0.${{ github.run_number }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version manifest
        if: success()
        run: |
          RELEASE_DATE=$(date -u +%Y-%m-%d)
          echo "{" > public/version.json
          echo "  \"version\": \"1.0.${{ github.run_number }}\"," >> public/version.json
          echo "  \"build\": ${{ github.run_number }}," >> public/version.json
          echo "  \"downloadUrl\": \"https://github.com/${{ github.repository }}/releases/download/v1.0.${{ github.run_number }}/ImpactATMS-V1.0.${{ github.run_number }}.apk\"," >> public/version.json
          echo "  \"releaseNotes\": \"Build ${{ github.run_number }}\"," >> public/version.json
          echo "  \"releaseDate\": \"${RELEASE_DATE}\"" >> public/version.json
          echo "}" >> public/version.json
          echo "Updated version.json to build ${{ github.run_number }}"

      - name: Commit version manifest
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || git pull --rebase origin master || true
          git add public/version.json
          git commit -m "chore: update version manifest to v1.0.${{ github.run_number }}" || echo "No changes to commit"
          git push

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-logs
          path: |
            android/app/build/reports/
            android/app/build/outputs/logs/
            android/.gradle/
          retention-days: 7
