name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Inspect SDK JAR API
        run: |
          echo "=== UHFReader class methods ==="
          javap -classpath android/app/libs/HCUHF_v1.0.8_20250102.jar com.xlzn.hcpda.uhf.UHFReader 2>/dev/null || echo "Could not decompile UHFReader"
          echo ""
          echo "=== UHFTagEntity class methods ==="
          javap -classpath android/app/libs/HCUHF_v1.0.8_20250102.jar com.xlzn.hcpda.uhf.entity.UHFTagEntity 2>/dev/null || echo "Could not decompile UHFTagEntity"
          echo ""
          echo "=== OnInventoryDataListener interface ==="
          javap -classpath android/app/libs/HCUHF_v1.0.8_20250102.jar com.xlzn.hcpda.uhf.interfaces.OnInventoryDataListener 2>/dev/null || echo "Could not decompile OnInventoryDataListener"
          echo ""
          echo "=== UHFReaderResult class ==="
          javap -classpath android/app/libs/HCUHF_v1.0.8_20250102.jar com.xlzn.hcpda.uhf.entity.UHFReaderResult 2>/dev/null || echo "Could not decompile UHFReaderResult"
          echo "=== End of SDK inspection ==="

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.11.1 --distribution-type all

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-logs
          path: |
            android/app/build/reports/
            android/app/build/outputs/logs/
            android/.gradle/
          retention-days: 7
