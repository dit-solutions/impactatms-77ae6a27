name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Gradle wrapper permissions
        run: chmod +x android/gradlew

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.11.1 --distribution-type all

      - name: Create consistent debug keystore
        run: |
          # IMPORTANT: To avoid Android "package conflicts" on update, every APK must be
          # signed with the SAME key. Do not generate a new keystore in CI.
          if [ -z "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" ]; then
            echo "ERROR: Missing GitHub secret DEBUG_KEYSTORE_BASE64."
            echo "Create one debug.keystore once, base64-encode it, and save it as a repo secret."
            echo "Then rerun the workflow."
            exit 1
          fi

          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > ~/.android/debug.keystore
          cp ~/.android/debug.keystore android/debug.keystore

          # Output keystore fingerprint for verification
          keytool -list -v -keystore ~/.android/debug.keystore -storepass android 2>/dev/null | grep "SHA256:" || true

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK with version
        run: |
          SEMVER=$(node -p "require('./package.json').version")
          BUILD=${{ github.run_number }}
          VERSION="v${SEMVER}-b${BUILD}"
          mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/ImpactATMS-${VERSION}.apk
          echo "APK renamed to ImpactATMS-${VERSION}.apk"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SEMVER=${SEMVER}" >> $GITHUB_ENV
          echo "BUILD=${BUILD}" >> $GITHUB_ENV

      - name: Create GitHub Release with APK
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ImpactATMS ${{ env.VERSION }}
          files: android/app/build/outputs/apk/debug/ImpactATMS-${{ env.VERSION }}.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version manifest
        if: success()
        run: |
          SEMVER="${{ env.SEMVER }}"
          BUILD="${{ env.BUILD }}"
          VERSION="${{ env.VERSION }}"
          DOWNLOAD="https://github.com/dit-solutions/impactatms-77ae6a27/releases/download/${VERSION}/ImpactATMS-${VERSION}.apk"

          cat > public/version.json << EOF
{
  "version": "${SEMVER}",
  "build": ${BUILD},
  "downloadUrl": "${DOWNLOAD}",
  "releaseNotes": "Build ${BUILD}",
  "releaseDate": "$(date -u +%Y-%m-%d)"
}
EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/version.json

          # Rebase-and-retry loop to handle concurrent pushes
          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git commit -m "chore: update version.json to ${VERSION} [skip ci]" --allow-empty && \
            git push origin HEAD:"${GITHUB_REF_NAME}" && break
            sleep 2
          done

      - name: Print build logs on failure
        if: failure()
        run: |
          echo "=== Build failure logs ==="
          cat android/app/build/outputs/logs/*.txt 2>/dev/null || true
          find android/app/build/reports -name "*.html" -exec echo "Report: {}" \; 2>/dev/null || true
